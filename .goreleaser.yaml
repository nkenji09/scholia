version: 2

project_name: scholia

before:
  hooks:
    - go mod tidy

builds:
  - id: scholia
    main: ./cmd/scholia
    binary: scholia
    env:
      - CGO_ENABLED=0
    # 版・commit・build date を internal/cli の変数へ注入する。
    # 変数パスは internal/cli/version.go の var (version/commit/date) と厳密一致させること。
    ldflags:
      - -s -w
      - -X github.com/nkenji09/scholia/internal/cli.version={{.Version}}
      - -X github.com/nkenji09/scholia/internal/cli.commit={{.Commit}}
      - -X github.com/nkenji09/scholia/internal/cli.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: scholia
    ids:
      - scholia
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  github:
    owner: nkenji09
    name: scholia
  draft: true
