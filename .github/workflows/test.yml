name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: gofmt
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "gofmt needs to be run on the following files:"
            echo "$diff"
            exit 1
          fi

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24.13.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        working-directory: web
        run: npm ci

      - name: tsc --noEmit
        working-directory: web
        run: npx tsc --noEmit

      - name: build
        working-directory: web
        run: npm run build

      # committed web/dist is the canonical embed source (go:embed); the local darwin
      # build is the authority normalized by hand at merge time. This step is a
      # best-effort drift check only: CI runs on ubuntu-latest (cross-platform from
      # the darwin authority), and byte-identical output across OSes is not guaranteed
      # (rolldown/mermaid chunk hashes). continue-on-error keeps this from failing the
      # job on a false positive — it only surfaces drift for a human to look at; the
      # build itself (tsc/vite above) still fails the job on real breakage.
      - name: verify web/dist matches committed build
        continue-on-error: true
        run: git diff --exit-code -- web/dist

  scholia-invariants:
    name: scholia invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # shallow clone では origin/<base> が解決できないため必須（#45 U4）

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build scholia
        run: go build -o /tmp/scholia ./cmd/scholia

      # decision の append-only 防衛（欄位単位・#45 U4）。push(main) では base が
      # 無いため PR のみ。#42 型の全店 retrofit は PR label
      # decision-retrofit-approved による明示の例外承認（env の値＝理由として
      # 出力に記録される）＋例外承認の decision 記録を必須とする運用規約。
      - name: decisions append-only (diff --check)
        if: github.event_name == 'pull_request'
        env:
          SCHOLIA_ALLOW_DECISION_RETROFIT: ${{ contains(github.event.pull_request.labels.*.name, 'decision-retrofit-approved') && 'PR label decision-retrofit-approved' || '' }}
        run: /tmp/scholia diff --check "origin/${{ github.base_ref }}"

      # warn の歯止め（ratchet・#45 U4）。error は常に fail・baseline
      # （.scholia/lint-baseline.json）に無い新規 warn のみ fail。baseline 不在の
      # 間は非活性（error のみ fail）。
      - name: lint ratchet (lint --ci)
        run: /tmp/scholia lint --ci
